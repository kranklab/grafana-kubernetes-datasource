services:
  grafana:
    user: root
    container_name: 'kranklab-kubernetes-datasource'

    build:
      context: ./.config
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.4.0}
        development: ${DEVELOPMENT:-false}
    ports:
      - "3000:3000/tcp"
      - "2345:2345/tcp" # delve
    security_opt:
      - 'apparmor:unconfined'
      - 'seccomp:unconfined'
    cap_add:
      - SYS_PTRACE
    network_mode: host
    volumes:
      - ./dist:/var/lib/grafana/plugins/kranklab-kubernetes-datasource
      - ../kranklab-kubernetesdashboard-app/dist:/var/lib/grafana/plugins/kranklab-kubernetesdashboard-app
      - ../kranklab-kubernetes-panel/dist:/var/lib/grafana/plugins/kranklab-kubernetes-panel
      - ./provisioning:/etc/grafana/provisioning
      - .:/root/kranklab-kubernetes-datasource

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.kranklab-kubernetes-datasource:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: "1"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: kranklab-kubernetes-datasource,kranklab-kubernetes-panel,kranklab-kubernetesdashboard-app
      GF_INSTALL_PLUGINS: grafana-polystat-panel
